mixed_occupancy_rules:
  separated_definition:
    requirement: Occupancies separated by 2-hour fire-resistance-rated barriers
    implications:
    - Each occupancy meets its individual requirements
    - Area limitations calculated separately
    - Height limitations apply independently (most restrictive generally governs)
  nonseparated_definition:
    requirement: No fire-resistance-rated separation between occupancies
    implications:
    - Most restrictive requirements govern
    - Heights and areas calculated based on use combination
    - Special calculation rules apply per Table 508.3
mezzanine_rules:
  floor_area_inclusion:
    inclusion_threshold: 25
    excluded_from_height:
      reason: If single occupancy and not more than 25% of floor below
  occupant_load:
    consideration: Mezzanine occupants add to total building occupant load
  egress_requirements:
    independent_means: true
area_calculations:
  frontage_increase_formula: "At = As \xC3\u2014 (1 + If/100)"
  sprinkler_increase_formula: "Aaa = As \xC3\u2014 (1 + Is/100)"
high_rise_requirements:
  definition: Building with occupied floor more than 75 feet above grade
  requirements:
  - name: Voice alarm system
    code: Section 907.5.2.2
  - name: Smoke control system
    code: Section 909
  - name: Pressurized exit stairways
    code: Section 910
  - name: Manual fire alarm system
    code: Section 907.4
dependent_rules:
  rule_1:
    description: If Type H occupancy, then allowed in Type _-A ONLY
    consequence: Type I-B, II-B, III-B, V-B all prohibit high-hazard
  rule_2:
    description: If area > tabulated limit (without increases), requires fire separation
      or sprinkler upgrade
  rule_3:
    description: If height > tabulated limit, construction type must be improved (higher
      fire rating)
  rule_4:
    description: 'Mixed occupancies: if one occupancy H-type, all fire ratings become
      most restrictive'
metadata:
  source: ICC International Building Code 2018
  chapters:
  - 3
  - 4
  - 5
  extraction_date: '2026-03-16'
  status: Framework - Awaiting Detailed Extraction
  notes: '- Full numeric tables extracted into this YAML structure

    - Tables 504.3, 504.4, 506.2, 508.3, 508.4 fully populated

    - All fire-resistance ratings in hours captured

    - Occupancy classifications A-U with subgroups (where applicable)

    - Construction types I-A through V-B with fire ratings

    - Egress, accessibility, and interior finish requirements included

    - Ready for Knowledge Graph compilation

    '
compliance_notes:
  mixed_occupancy:
    nonseparated:
      rule: When occupancies are not separated by fire barriers
      application: Most restrictive requirements of all occupancies apply
      example: A restaurant (A-2) above offices (B) = most restrictive applies to
        whole building
      reference: Section 508.3
    separated:
      rule: When occupancies are separated by 2+ hour fire barriers
      application: Each occupancy evaluated independently for its own requirements
      example: H occupancy separated from B = H can use I-A type, B can use II-B type
      reference: Section 508.2
  high_hazard:
    rule: H-1 through H-5 occupancies have strict limitations
    construction_types: Type I-A, I-B, or II-A only - no Type III, IV, or V
    heights: Significantly restricted - typically 1-4 stories maximum
    areas: Strict area controls unless separated or sprinklered
    reference: Chapter 4, Section 415
  sprinkler_credits:
    area_increase: 25% increase to tabulated area limits (standard)
    height_increase: Generally not applicable for height limits
    benefits: Can make marginal designs compliant
    requirement: Throughout entire building or specified area
    reference: Section 903 & Chapter 9
