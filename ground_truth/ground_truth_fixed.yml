occupancy_groups:
  A:
    name: Assembly Occupancy
    description: Buildings or portions of buildings in which groups of persons gather
    subgroups:
      A-1:
        name: Assembly - Fixed Seating
        capacity_threshold: 75
        examples:
        - theaters
        - concert halls
        - auditoriums
      A-2:
        name: Assembly - Liquid Refreshment
        capacity_threshold: 50
        examples:
        - restaurants
        - bars
        - lounges
      A-3:
        name: Assembly - General
        capacity_threshold: 100
        examples:
        - conference centers
        - chapels
        - bowling
      A-4:
        name: Assembly - Indoor Recreation
        capacity_threshold: 50
        examples:
        - tennis
        - squash
        - racquetball
      A-5:
        name: Assembly - Outdoor Recreation
        capacity_threshold: null
        examples:
        - outdoor stadiums
        - grandstands
        - bleachers
  B:
    name: Business Occupancy
    description: Office, professional services, occupancies not classified elsewhere
  E:
    name: Educational Occupancy
    description: Buildings for instruction, training
  F:
    name: Factory and Industrial
    description: Manufacturing, processing, storage
    subgroups:
      F-1:
        name: Factory - Moderate Hazard
      F-2:
        name: Factory - Low Hazard
  H:
    name: High-Hazard Occupancy
    description: Occupancies with materials that constitute a physical or health hazard
    subgroups:
      H-1:
        name: Separation/Detonation Hazard
      H-2:
        name: Flammable Solid Manufacturing
      H-3:
        name: Oxidizing/Organic Peroxide Hazard
      H-4:
        name: Pyrophoric Hazard
      H-5:
        name: Unstable/Reactive Material
  I:
    name: Institutional Occupancy
    description: Buildings for persons under legal restraint or receiving personal
      care
    subgroups:
      I-1:
        name: Residential Care
      I-2:
        name: Hospital/Medical
      I-3:
        name: Detention/Correctional
      I-4:
        name: Young Children Care
  M:
    name: Mercantile Occupancy
    description: Stores, sales, marketing
  R:
    name: Residential Occupancy
    description: Buildings arranged for occupancy as residence
    subgroups:
      R-1:
        name: Hotels/Motels
      R-2:
        name: Multi-family Dwellings
      R-3:
        name: One/Two-family Dwellings
      R-4:
        name: Care Facilities (16+ occupants)
  S:
    name: Storage Occupancy
    description: Structures for storage not classified as H
    subgroups:
      S-1:
        name: Storage - Moderate Hazard
      S-2:
        name: Storage - Low Hazard
  U:
    name: Utility and Miscellaneous Occupancy
    description: Buildings not classified above
construction_types:
  I-A:
    name: Type I - Fire Resistant
    primary_materials:
    - Non-combustible
    - Fire-rated throughout
    fire_rating_structural_frame: 3
    fire_rating_exterior_walls: 3
    fire_rating_interior_bearing_walls: 3
  I-B:
    name: Type I - Modified
    primary_materials:
    - Non-combustible
    fire_rating_structural_frame: 2
    fire_rating_exterior_walls: 2
    fire_rating_interior_bearing_walls: 2
  II-A:
    name: Type II - Non-Combustible
    primary_materials:
    - Non-combustible
    fire_rating_structural_frame: 1
    fire_rating_exterior_walls: 1
    fire_rating_interior_bearing_walls: 1
  II-B:
    name: Type II - Protected
    primary_materials:
    - Non-combustible with protection
    fire_rating_structural_frame: 0
    fire_rating_exterior_walls: 0
    fire_rating_interior_bearing_walls: 0
  II-C:
    name: Type II - Unprotected
    primary_materials:
    - Non-combustible unprotected
    fire_rating_structural_frame: 0
    fire_rating_exterior_walls: 0
    fire_rating_interior_bearing_walls: 0
  III-A:
    name: Type III - Combustible
    primary_materials:
    - Combustible, exterior non-combustible
    fire_rating_structural_frame: 1
    fire_rating_exterior_walls: 1
    fire_rating_interior_bearing_walls: 1
  III-B:
    name: Type III - Unprotected
    primary_materials:
    - Combustible
    fire_rating_structural_frame: 0
    fire_rating_exterior_walls: 0
    fire_rating_interior_bearing_walls: 0
  IV-A:
    name: Type IV - Heavy Timber
    primary_materials:
    - Heavy Timber
    fire_rating_structural_frame: 0
    fire_rating_exterior_walls: 2
    fire_rating_interior_bearing_walls: 1
  V-A:
    name: Type V - Protected
    primary_materials:
    - Combustible with protection
    fire_rating_structural_frame: 1
    fire_rating_exterior_walls: 1
    fire_rating_interior_bearing_walls: 1
  V-B:
    name: Type V - Unprotected
    primary_materials:
    - Combustible
    fire_rating_structural_frame: 0
    fire_rating_exterior_walls: 0
    fire_rating_interior_bearing_walls: 0
