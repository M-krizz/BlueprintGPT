# ============================================================================
# CHAPTER 4: SPECIAL DETAILED REQUIREMENTS
# ============================================================================

# Fire-Resistance Rated Barriers
fire_resistance_requirements:
  occupancy_separations:
    # Table 508.4 - Fire-Resistance Rating Requirements for Occupancy Separations
    A_vs_B: 0
    A_vs_E: 0
    A_vs_F: 1
    A_vs_H: 2
    A_vs_I: 1
    A_vs_M: 0
    A_vs_R: 2
    A_vs_S: 1
    A_vs_U: 1
    
    B_vs_E: 0
    B_vs_F: 1
    B_vs_H: 2
    B_vs_I: 1
    B_vs_M: 0
    B_vs_R: 1
    B_vs_S: 1
    B_vs_U: 0
    
    E_vs_F: 1
    E_vs_H: 2
    E_vs_I: 1
    E_vs_M: 0
    E_vs_R: 1
    E_vs_S: 1
    E_vs_U: 0
    
    F_vs_H: 2
    F_vs_I: 2
    F_vs_M: 0
    F_vs_R: 2
    F_vs_S: 0
    F_vs_U: 0
    
    H_vs_I: 3
    H_vs_M: 2
    H_vs_R: 3
    H_vs_S: 2
    H_vs_U: 2
    
    I_vs_M: 1
    I_vs_R: 2
    I_vs_S: 1
    I_vs_U: 1
    
    M_vs_R: 0
    M_vs_S: 0
    M_vs_U: 0
    
    R_vs_S: 1
    R_vs_U: 0
    
    S_vs_U: 0

  # High-hazard material control areas
  high_hazard_control_areas:
    H-1:
      fire_rating: 4  # hours
      description: "Separation/Detonation Hazard"
      allowed_types: [I-A, I-B, II-A]
      
    H-2:
      fire_rating: 3
      description: "Flammable Solid Manufacturing"
      allowed_types: [I-A, I-B, II-A, II-B, III-A, IV-A, V-A]
      
    H-3:
      fire_rating: 2
      description: "Oxidizing/Organic Peroxide"
      allowed_types: [I-A, I-B, II-A, II-B, III-A, IV-A, V-A]
      
    H-4:
      fire_rating: 2
      description: "Pyrophoric Hazard"
      allowed_types: [I-A, I-B, II-A, II-B, III-A, IV-A, V-A]
      
    H-5:
      fire_rating: 2
      description: "Unstable/Reactive Material"
      allowed_types: [I-A, I-B, II-A, II-B, III-A, IV-A, V-A]

# Means of Egress Requirements
means_of_egress:
  general_requirements:
    min_exits: 2  # Minimum number of exits from any occupancy (with exceptions)
    max_common_path_travel: 75  # Maximum feet for shared exit path (some exceptions)
    
  egress_widths:
    # Occupant load / width requirements
    # Unit: 0.3 inches per person for stairways
    # Unit: 0.2 inches per person for ramps
    stairway_unit_width: 0.3  # inches per person
    ramp_unit_width: 0.2
    corridor_unit_width: 0.3
    
  exit_access_requirements:
    A-1:
      max_travel_distance: 250  # feet
      min_exits: 2
      
    A-2:
      max_travel_distance: 250
      min_exits: 2
      
    A-3:
      max_travel_distance: 250
      min_exits: 2
      
    B:
      max_travel_distance: 300
      min_exits: 1  # if area < occupant load threshold
      
    E:
      max_travel_distance: 250
      min_exits: 2
      
    # ... additional occupancies

  stairway_requirements:
    min_width: 44  # inches (standard)
    max_stair_rise: 7  # inches  (Maximum height of tread)
    min_stair_tread: 11  # inches (Minimum depth of tread)
    max_handrail_height: 38  # inches (Maximum height of handrail)
    min_handrail_height: 34  # inches (Minimum height of handrail)
    headroom_minimum: 80  # inches

  door_requirements:
    min_width: 32  # inches (clear opening)
    max_threshold_height: 1.25  # inches

# Accessible Routes and Facilities
accessibility_requirements:
  accessible_route_width: 36  # inches minimum
  alcove_width: 18  # inches minimum
  door_clearance_pull_side: 18  # inches minimum
  door_clearance_push_side: 12
  ramp_slope_max: 0.0833  # 1:12 ratio (1 inch rise per 12 inches run)
  landing_size: 60  # inches x 60 inches minimum

# Interior Finish Requirements
interior_finish:
  flame_spread_classifications:
    A:
      flame_spread_index: 0-25
      smoke_development: 0-450
      
    B:
      flame_spread_index: 26-75
      smoke_development: 0-450
      
    C:
      flame_spread_index: 76-200
      smoke_development: 0-450
      
  occupancy_requirements:
    A:
      exits: A
      corridors: B
      other_spaces: C
      
    B:
      exits: B
      corridors: C
      other_spaces: C
      
    # ... additional occupancies

# Lighting and Ventilation
lighting_ventilation:
  natural_light_area_factor:
    # Area of glazing / floor area ratio
    minimum: 0.08  # 8% of floor area
    
  ventilation_cfm_per_person:
    A-1: 15
    A-2: 20
    B: 20
    E: 15
    F:
      F-1: 15
      F-2: 15
    M: 20
    R:
      R-1: 15
      R-2: 15
      R-3: 15
      R-4: 15
    S:
      S-1: 15
      S-2: 15
    U: 15

# ============================================================================
# COMPLIANCE RULES AND CONSTRAINTS
# ============================================================================

mixed_occupancy_rules:
  # Separated occupancy: each occupancy individually evaluated
  separated_definition:
    requirement: "Occupancies separated by 2-hour fire-resistance-rated barriers"
    implications:
      - "Each occupancy meets its individual requirements"
      - "Area limitations calculated separately"
      - "Height limitations apply independently (most restrictive generally governs)"
      
  # Nonseparated occupancy: combined evaluation
  nonseparated_definition:
    requirement: "No fire-resistance-rated separation between occupancies"
    implications:
      - "Most restrictive requirements govern"
      - "Heights and areas calculated based on use combination"
      - "Special calculation rules apply per Table 508.3"

# Mezzanines (Intermediate levels)
mezzanine_rules:
  floor_area_inclusion:
    inclusion_threshold: 25  # percent of floor area below
    excluded_from_height:
      reason: "If single occupancy and not more than 25% of floor below"
      
  occupant_load:
    consideration: "Mezzanine occupants add to total building occupant load"
    
  egress_requirements:
    independent_means: true  # Usually required

# Area modification adjustments (Equations 5-1, 5-2)
area_calculations:
  frontage_increase_formula: "At = As × (1 + If/100)"
  # At = Tabulated area (with frontage increase)
  # As = Base area from table
  # If = Frontage increase factor (up to 100%)
  
  sprinkler_increase_formula: "Aaa = As × (1 + Is/100)"
  # Aaa = Allowable area with sprinklers
  # As = Area from table or after frontage adjustment
  # Is = Sprinkler increase factor (25% or 33%)

# High-rise building requirements
high_rise_requirements:
  definition: "Building with occupied floor more than 75 feet above grade"
  requirements:
    - name: "Voice alarm system"
      code: "Section 907.5.2.2"
    - name: "Smoke control system"
      code: "Section 909"
    - name: "Pressurized exit stairways"
      code: "Section 910"
    - name: "Manual fire alarm system"
      code: "Section 907.4"

dependent_rules:
  rule_1:
    description: "If Type H occupancy, then allowed in Type _-A ONLY"
    consequence: "Type I-B, II-B, III-B, V-B all prohibit high-hazard"
    
  rule_2:
    description: "If area > tabulated limit (without increases), requires fire separation or sprinkler upgrade"
    
  rule_3:
    description: "If height > tabulated limit, construction type must be improved (higher fire rating)"
    
  rule_4:
    description: "Mixed occupancies: if one occupancy H-type, all fire ratings become most restrictive"

